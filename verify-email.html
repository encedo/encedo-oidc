<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Confirm your email — Encedo</title>
<link rel="icon" href="/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --purple:  #6E358C;
    --navy:    #2A225E;
    --text:    #222;
    --muted:   #666;
    --bg:      #f4f4f4;
    --white:   #fff;
    --green:   #2ecc71;
    --red:     #e74c3c;
    --shadow:  -10px -1px 82px 43px rgba(0,0,0,.09);
  }

  body {
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    min-height: 100vh;
    background: linear-gradient(160deg, #eee, #fff);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 30px 16px;
    color: var(--text);
  }

  .screen { display: none; width: 100%; max-width: 440px; }
  .screen.on { display: block; }

  .logo-block { text-align: center; margin-bottom: 28px; }
  .logo-block img { height: 48px; border-radius: 14px; }
  .logo-sub {
    font-size: 11px; letter-spacing: .2em;
    color: var(--muted); text-transform: uppercase; margin-top: 10px;
  }

  .card {
    background: var(--white);
    border-radius: 28px;
    box-shadow: var(--shadow);
    padding: 40px 40px 44px;
    text-align: center;
  }

  .icon-circle {
    width: 72px; height: 72px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 22px;
  }
  .icon-circle-ok  { background: rgba(46,204,113,.1); border: 1px solid rgba(46,204,113,.35); }
  .icon-circle-err { background: rgba(231,76,60,.1);  border: 1px solid rgba(231,76,60,.35); }

  h1 { font-size: 22px; font-weight: 700; color: var(--navy); margin-bottom: 12px; }
  p  { font-size: 15px; color: var(--muted); line-height: 1.6; }
  .email { color: var(--purple); font-weight: 600; }

  .spinner {
    width: 34px; height: 34px; border: 3px solid rgba(110,53,140,.15);
    border-top-color: var(--purple); border-radius: 50%;
    animation: spin .8s linear infinite; margin: 6px auto 22px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 520px) { .card { padding: 30px 24px 34px; border-radius: 22px; } }
</style>
</head>
<body>

<div class="screen on" id="s-loading">
  <div class="logo-block">
    <img src="/logo.png" alt="Encedo">
    <div class="logo-sub">Email Verification</div>
  </div>
  <div class="card">
    <div class="spinner"></div>
    <p>Confirming your email address&hellip;</p>
  </div>
</div>

<div class="screen" id="s-ok">
  <div class="logo-block">
    <img src="/logo.png" alt="Encedo">
    <div class="logo-sub">Email Verification</div>
  </div>
  <div class="card">
    <div class="icon-circle icon-circle-ok">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#2ecc71" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h1>Email confirmed</h1>
    <p><span class="email" id="ok-email"></span> is now verified. You can close this tab.</p>
  </div>
</div>

<div class="screen" id="s-err">
  <div class="logo-block">
    <img src="/logo.png" alt="Encedo">
    <div class="logo-sub">Email Verification</div>
  </div>
  <div class="card">
    <div class="icon-circle icon-circle-err">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#e74c3c" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </div>
    <h1>Link not valid</h1>
    <p id="err-msg">This confirmation link is invalid or has expired. Ask your administrator to send a new one.</p>
  </div>
</div>

<script src="/verify-email.js"></script>
</body>
</html>
