<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Confirm your email — Encedo</title>
<link rel="icon" href="/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0a0c0f; --card:#12161c; --rim:#1e2730; --text:#D8C8F8; --muted:#6a7a8a;
          --accent:#8040F0; --green:#34D89A; --red:#FF4D72; --white:#F2EEFF; }
  * { box-sizing: border-box; margin: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif;
         min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card { background: var(--card); border: 1px solid var(--rim); border-radius: 18px;
          padding: 40px 36px; max-width: 420px; width: 100%; text-align: center; }
  .logo { width: 108px; margin: 0 auto 26px; display: block; }
  .icon { width: 56px; height: 56px; border-radius: 50%; display: none; align-items: center;
          justify-content: center; margin: 0 auto 20px; }
  .icon.ok  { background: rgba(52,216,154,.12); }
  .icon.err { background: rgba(255,77,114,.12); }
  h1 { font-size: 21px; font-weight: 700; color: var(--white); margin-bottom: 10px; }
  p  { font-size: 14px; color: var(--muted); line-height: 1.6; }
  .email { color: var(--text); font-weight: 600; }
  .spinner { width: 30px; height: 30px; border: 3px solid var(--rim); border-top-color: var(--accent);
             border-radius: 50%; animation: spin .8s linear infinite; margin: 8px auto 18px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .screen { display: none; }
  .screen.on { display: block; }
</style>
</head>
<body>
  <div class="card">
    <img class="logo" src="/logo.png" alt="Encedo">

    <div class="screen on" id="s-loading">
      <div class="spinner"></div>
      <p>Confirming your email address…</p>
    </div>

    <div class="screen" id="s-ok">
      <div class="icon ok" style="display:flex">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#34D89A" stroke-width="2.6"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h1>Email confirmed</h1>
      <p><span class="email" id="ok-email"></span> is now verified. You can close this tab.</p>
    </div>

    <div class="screen" id="s-err">
      <div class="icon err" style="display:flex">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#FF4D72" stroke-width="2.6"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </div>
      <h1>Link not valid</h1>
      <p id="err-msg">This confirmation link is invalid or has expired. Ask your administrator to send a new one.</p>
    </div>
  </div>
  <script src="/verify-email.js"></script>
</body>
</html>
